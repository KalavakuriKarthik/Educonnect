<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduConnect – Users</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title"></span>
      <div class="topbar-actions">
        <button class="notif-btn" onclick="location.href='notifications.html'">
          <i class="fas fa-bell"></i>
          <span class="notif-badge" id="notif-count" style="display:none">0</span>
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h2>System Users</h2><p>All registered users across every role</p></div>
      </div>

      <!-- Filters -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-body" style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
          <div class="form-group" style="flex:1;min-width:180px;margin:0">
            <input type="text" id="search-input" class="form-control" placeholder="Search name or email…" oninput="filterUsers()"/>
          </div>
          <div class="form-group" style="margin:0">
            <select id="role-filter" class="form-select" onchange="filterUsers()">
              <option value="">All Roles</option>
              <option value="STUDENT">Student</option>
              <option value="TEACHER">Teacher</option>
              <option value="SCHOOL_ADMIN">School Admin</option>
              <option value="PROGRAM_MANAGER">Program Manager</option>
              <option value="COMPLIANCE_OFFICER">Compliance Officer</option>
              <option value="GOVERNMENT_AUDITOR">Government Auditor</option>
            </select>
          </div>
          <button class="btn-outline-ec" onclick="loadUsers()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
      </div>

      <!-- Role summary chips -->
      <div id="role-chips" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px"></div>

      <div class="card">
        <div class="card-header">
          <h5><i class="fas fa-users"></i> All Users</h5>
          <span id="user-count" style="font-size:.85rem;color:var(--text-muted)"></span>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="ec-table">
              <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Status</th></tr></thead>
              <tbody id="users-tbody"><tr><td colspan="6"><div class="spinner"></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
  buildLayout('Users', 'users');

  let allUsers = [];

  async function loadUsers() {
    document.getElementById('users-tbody').innerHTML = '<tr><td colspan="6"><div class="spinner"></div></td></tr>';
    try {
      allUsers = await AuthAPI.getUsers();
      buildRoleChips(allUsers);
      renderUsers(allUsers);
    } catch(e) {
      document.getElementById('users-tbody').innerHTML = `<tr><td colspan="6" style="color:var(--danger)">Error: ${e.message}</td></tr>`;
    }
  }

  function buildRoleChips(users) {
    const counts = {};
    users.forEach(u => { counts[u.role] = (counts[u.role]||0)+1; });
    document.getElementById('role-chips').innerHTML = Object.entries(counts).map(([role, count]) =>
      `<div style="display:flex;align-items:center;gap:6px;background:var(--card-bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;font-size:.82rem;font-weight:600;cursor:pointer" onclick="document.getElementById('role-filter').value='${role}';filterUsers()">
        ${badge(role)} <span style="color:var(--text-muted)">${count}</span>
      </div>`
    ).join('');
  }

  function filterUsers() {
    const q    = document.getElementById('search-input').value.toLowerCase();
    const role = document.getElementById('role-filter').value;
    const filtered = allUsers.filter(u =>
      (!role || u.role === role) &&
      ((u.name||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q))
    );
    renderUsers(filtered);
  }

  function renderUsers(list) {
    document.getElementById('user-count').textContent = `${list.length} user${list.length!==1?'s':''}`;
    const tbody = document.getElementById('users-tbody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-users"></i><p>No users found.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map((u, i) => `
      <tr>
        <td style="color:var(--text-muted)">${i+1}</td>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.8rem;flex-shrink:0">
              ${(u.name||'U').charAt(0).toUpperCase()}
            </div>
            <strong>${esc(u.name)}</strong>
          </div>
        </td>
        <td style="color:var(--text-muted)">${esc(u.email)}</td>
        <td style="color:var(--text-muted)">${esc(u.phone||'—')}</td>
        <td>${badge(u.role)}</td>
        <td>${badge(u.status)}</td>
      </tr>`).join('');
  }

  loadUsers();
</script>
</body>
</html>
