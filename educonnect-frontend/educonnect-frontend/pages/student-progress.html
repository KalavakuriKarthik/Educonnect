<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduConnect – My Progress</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title"></span>
      <div class="topbar-actions">
        <button class="notif-btn" onclick="location.href='notifications.html'">
          <i class="fas fa-bell"></i>
          <span class="notif-badge" id="notif-count" style="display:none">0</span>
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h2>My Progress</h2><p>Track your learning progress across all courses</p></div>
      </div>

      <!-- Summary stats -->
      <div class="stats-grid">
        <div class="stat-card" style="border-left-color:var(--accent)">
          <div class="stat-icon teal"><i class="fas fa-chart-line"></i></div>
          <div class="stat-info"><div class="stat-value" id="p-avg">—</div><div class="stat-label">Average Completion</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--success)">
          <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
          <div class="stat-info"><div class="stat-value" id="p-complete">—</div><div class="stat-label">Courses Completed</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--primary-light)">
          <div class="stat-icon blue"><i class="fas fa-spinner"></i></div>
          <div class="stat-info"><div class="stat-value" id="p-inprogress">—</div><div class="stat-label">In Progress</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--warning)">
          <div class="stat-icon orange"><i class="fas fa-star"></i></div>
          <div class="stat-info"><div class="stat-value" id="p-avg-grade">—</div><div class="stat-label">Average Grade</div></div>
        </div>
      </div>

      <!-- Progress per course -->
      <div class="card">
        <div class="card-header">
          <h5><i class="fas fa-chart-bar"></i> Course Progress</h5>
        </div>
        <div class="card-body" id="progress-cards">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Grade breakdown -->
      <div class="card">
        <div class="card-header">
          <h5><i class="fas fa-file-alt"></i> Graded Submissions</h5>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="ec-table">
              <thead>
                <tr><th>Assessment</th><th>Submitted</th><th>Grade</th><th>Feedback</th><th>Status</th></tr>
              </thead>
              <tbody id="grades-tbody">
                <tr><td colspan="5"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
  buildLayout('My Progress', 'progress');

  const user = Auth.getUser();

  async function loadProgress() {
    try {
      const student   = await StudentAPI.getByUserId(user.userId);
      const sid       = student.studentId;
      const progList  = await ProgressAPI.byStudent(sid);
      const subs      = await AssessmentAPI.submissionsByStudent(sid);

      // Stats
      const avg = progList.length
        ? progList.reduce((a,p)=>a+(p.completionPercentage||0),0)/progList.length : 0;
      document.getElementById('p-avg').textContent       = Math.round(avg)+'%';
      document.getElementById('p-complete').textContent  = progList.filter(p=>(p.completionPercentage||0)>=100).length;
      document.getElementById('p-inprogress').textContent= progList.filter(p=>(p.completionPercentage||0)>0&&(p.completionPercentage||0)<100).length;

      const graded = subs.filter(s=>s.grade!=null);
      const avgGrade = graded.length ? (graded.reduce((a,s)=>a+s.grade,0)/graded.length).toFixed(1) : '—';
      document.getElementById('p-avg-grade').textContent = avgGrade;

      // Progress cards
      const cardsEl = document.getElementById('progress-cards');
      if (!progList.length) {
        cardsEl.innerHTML = `<div class="empty-state"><i class="fas fa-chart-line"></i><p>No progress data yet. Enroll in courses and complete assessments.</p></div>`;
      } else {
        cardsEl.innerHTML = progList.map(p => {
          const pct = Math.round(p.completionPercentage||0);
          const color = pct>=100?'var(--success)':pct>=50?'var(--accent)':'var(--warning)';
          return `
          <div style="margin-bottom:24px;padding:18px;background:#f7f9fc;border-radius:10px;border-left:4px solid ${color}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <div>
                <div style="font-weight:700;font-size:1rem">${esc(p.courseTitle)}</div>
                <div style="font-size:.8rem;color:var(--text-muted)">Last updated: ${fmtDate(p.date)}</div>
              </div>
              <div style="text-align:right">
                <div style="font-family:'Poppins',sans-serif;font-size:1.4rem;font-weight:700;color:${color}">${pct}%</div>
                <div style="font-size:.75rem;color:var(--text-muted)">${pct>=100?'Completed':pct>0?'In Progress':'Not Started'}</div>
              </div>
            </div>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" style="width:${pct}%;background:${color}"></div>
            </div>
          </div>`;
        }).join('');
      }

      // Grades table
      const tbody = document.getElementById('grades-tbody');
      if (!subs.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="fas fa-file-alt"></i><p>No submissions yet.</p></div></td></tr>`;
      } else {
        tbody.innerHTML = subs.map(s=>`<tr>
          <td><strong>${esc(s.assessmentTitle)}</strong></td>
          <td>${fmtDate(s.date)}</td>
          <td>
            ${s.grade!=null
              ? `<span style="font-family:'Poppins',sans-serif;font-size:1.1rem;font-weight:700;color:${s.grade>=60?'var(--success)':'var(--danger)'}">${s.grade}</span><span style="color:var(--text-muted);font-size:.8rem">/100</span>`
              : '<span style="color:var(--text-muted)">Not graded</span>'}
          </td>
          <td style="color:var(--text-muted);max-width:200px">${esc(s.feedback||'—')}</td>
          <td>${badge(s.status)}</td>
        </tr>`).join('');
      }
    } catch(e) {
      showToast('Failed to load progress: '+e.message, 'error');
    }
  }

  loadProgress();
</script>
</body>
</html>
