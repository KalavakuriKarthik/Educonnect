<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduConnect – Admin Dashboard</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title"></span>
      <div class="topbar-actions">
        <button class="notif-btn" onclick="location.href='notifications.html'">
          <i class="fas fa-bell"></i>
          <span class="notif-badge" id="notif-count" style="display:none">0</span>
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h2>Admin Dashboard</h2><p>Platform-wide overview and management</p></div>
        <button class="btn-primary-ec" onclick="location.href='reports.html'"><i class="fas fa-chart-bar"></i> View Reports</button>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card" style="border-left-color:var(--primary-light)">
          <div class="stat-icon blue"><i class="fas fa-users"></i></div>
          <div class="stat-info"><div class="stat-value" id="a-students">—</div><div class="stat-label">Total Students</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--accent)">
          <div class="stat-icon teal"><i class="fas fa-book-open"></i></div>
          <div class="stat-info"><div class="stat-value" id="a-courses">—</div><div class="stat-label">Total Courses</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--warning)">
          <div class="stat-icon orange"><i class="fas fa-user-check"></i></div>
          <div class="stat-info"><div class="stat-value" id="a-enrollments">—</div><div class="stat-label">Total Enrollments</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--success)">
          <div class="stat-icon green"><i class="fas fa-tasks"></i></div>
          <div class="stat-info"><div class="stat-value" id="a-assessments">—</div><div class="stat-label">Assessments</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--danger)">
          <div class="stat-icon red"><i class="fas fa-chart-pie"></i></div>
          <div class="stat-info"><div class="stat-value" id="a-completion">—</div><div class="stat-label">Avg Completion</div></div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <!-- All Users -->
        <div class="card">
          <div class="card-header">
            <h5><i class="fas fa-users"></i> System Users</h5>
            <button class="btn-outline-ec" onclick="location.href='admin-users.html'">Manage</button>
          </div>
          <div class="card-body">
            <div id="users-summary">
              <div class="spinner"></div>
            </div>
          </div>
        </div>

        <!-- Recent Courses -->
        <div class="card">
          <div class="card-header">
            <h5><i class="fas fa-book-open"></i> Recent Courses</h5>
            <button class="btn-outline-ec" onclick="location.href='admin-courses.html'">All Courses</button>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="ec-table">
                <thead><tr><th>Course</th><th>Teacher</th><th>Enrolled</th><th>Status</th></tr></thead>
                <tbody id="recent-courses-tbody"><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Students Table -->
      <div class="card" style="margin-top:0">
        <div class="card-header">
          <h5><i class="fas fa-user-graduate"></i> Recent Students</h5>
          <button class="btn-outline-ec" onclick="location.href='admin-students.html'">All Students</button>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="ec-table">
              <thead><tr><th>Name</th><th>Email</th><th>Gender</th><th>Status</th></tr></thead>
              <tbody id="students-tbody"><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
  buildLayout('Admin Dashboard', 'dashboard');

  async function loadDashboard() {
    try {
      const metrics = await ReportAPI.dashboard();
      document.getElementById('a-students').textContent    = metrics.totalStudents    || 0;
      document.getElementById('a-courses').textContent     = metrics.totalCourses     || 0;
      document.getElementById('a-enrollments').textContent = metrics.totalEnrollments || 0;
      document.getElementById('a-assessments').textContent = metrics.totalAssessments || 0;
      document.getElementById('a-completion').textContent  = (metrics.averageCourseCompletion || 0) + '%';

      // Users summary
      const users = await AuthAPI.getUsers();
      const roleCount = {};
      users.forEach(u => { roleCount[u.role] = (roleCount[u.role]||0) + 1; });
      document.getElementById('users-summary').innerHTML = Object.entries(roleCount).map(([r,c]) => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <span>${badge(r)}</span>
          <strong style="font-family:'Poppins',sans-serif;font-size:1.1rem">${c}</strong>
        </div>`).join('') || '<div class="empty-state"><i class="fas fa-users"></i><p>No users found.</p></div>';

      // Recent courses
      const courses = await CourseAPI.getAll();
      const ctbody = document.getElementById('recent-courses-tbody');
      if (!courses.length) {
        ctbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><i class="fas fa-book-open"></i><p>No courses.</p></div></td></tr>`;
      } else {
        ctbody.innerHTML = courses.slice(0,8).map(c => `<tr>
          <td><strong>${esc(c.title)}</strong></td>
          <td>${esc(c.teacherName||'—')}</td>
          <td>${c.enrollmentCount}</td>
          <td>${badge(c.status)}</td>
        </tr>`).join('');
      }

      // Students
      const students = await StudentAPI.getAll();
      const stbody = document.getElementById('students-tbody');
      if (!students.length) {
        stbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><i class="fas fa-user-graduate"></i><p>No students.</p></div></td></tr>`;
      } else {
        stbody.innerHTML = students.slice(0,10).map(s => `<tr>
          <td><strong>${esc(s.name)}</strong></td>
          <td style="color:var(--text-muted)">${esc(s.email||'—')}</td>
          <td>${esc(s.gender||'—')}</td>
          <td>${badge(s.status)}</td>
        </tr>`).join('');
      }
    } catch(e) { showToast('Load error: ' + e.message, 'error'); }
  }

  loadDashboard();
</script>
</body>
</html>
