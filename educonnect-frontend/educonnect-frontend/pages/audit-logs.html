<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduConnect – Audit Logs</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title"></span>
      <div class="topbar-actions">
        <button class="notif-btn" onclick="location.href='notifications.html'">
          <i class="fas fa-bell"></i><span class="notif-badge" id="notif-count" style="display:none">0</span>
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h2>Audit Logs</h2><p>System-wide action history for governance</p></div>
      </div>

      <div class="card">
        <div class="card-header"><h5><i class="fas fa-history"></i> All Audit Logs</h5></div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="ec-table">
              <thead><tr><th>ID</th><th>User</th><th>Action</th><th>Resource</th><th>Timestamp</th></tr></thead>
              <tbody id="logs-tbody"><tr><td colspan="5"><div class="spinner"></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
  buildLayout('Audit Logs', 'audit-logs');

  async function loadLogs() {
    const tbody = document.getElementById('logs-tbody');
    try {
      const logs = await AuditLogAPI.getAll();
      if (!logs.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="fas fa-history"></i><p>No audit logs found.</p></div></td></tr>`;
        return;
      }
      tbody.innerHTML = logs.map(l => `<tr>
        <td style="color:var(--text-muted)">${l.auditId}</td>
        <td><strong>${esc(l.user?.name||'System')}</strong><br/><small style="color:var(--text-muted)">${esc(l.user?.email||'')}</small></td>
        <td><span style="font-family:monospace;background:#f0f4f8;padding:2px 8px;border-radius:4px;font-size:.82rem">${esc(l.action)}</span></td>
        <td style="color:var(--text-muted)">${esc(l.resource)}</td>
        <td>${fmtDate(l.timestamp)}</td>
      </tr>`).join('');
    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="5" style="color:var(--danger)">Failed: ${e.message}</td></tr>`;
    }
  }

  loadLogs();
</script>
</body>
</html>
