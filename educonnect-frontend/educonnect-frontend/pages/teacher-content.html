<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduConnect – Content Management</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title"></span>
      <div class="topbar-actions">
        <button class="notif-btn" onclick="location.href='notifications.html'">
          <i class="fas fa-bell"></i>
          <span class="notif-badge" id="notif-count" style="display:none">0</span>
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h2>Content Management</h2><p>Upload and manage learning materials for your courses</p></div>
        <button class="btn-primary-ec" onclick="openModal('upload-modal')"><i class="fas fa-upload"></i> Upload Content</button>
      </div>

      <!-- Filter by course -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-body" style="display:flex;gap:12px;align-items:flex-end">
          <div class="form-group" style="flex:1;margin:0">
            <label class="form-label">Filter by Course ID</label>
            <input type="number" id="filter-course-id" class="form-control" placeholder="Enter course ID or leave empty for all"/>
          </div>
          <button class="btn-accent-ec" onclick="loadContent()"><i class="fas fa-filter"></i> Filter</button>
          <button class="btn-outline-ec" onclick="document.getElementById('filter-course-id').value='';loadContent()">Show All</button>
        </div>
      </div>

      <!-- Content Cards -->
      <div id="content-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px">
        <div class="spinner" style="grid-column:1/-1"></div>
      </div>
    </div>
  </div>
</div>

<!-- Upload Content Modal -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h5><i class="fas fa-upload"></i> Upload Content</h5>
      <button class="modal-close" onclick="closeModal('upload-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" id="ct-title" class="form-control" placeholder="Introduction to Variables…"/>
      </div>
      <div class="form-group">
        <label class="form-label">Course ID *</label>
        <input type="number" id="ct-course" class="form-control" placeholder="e.g. 1"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Content Type</label>
          <select id="ct-type" class="form-select">
            <option value="VIDEO">Video</option>
            <option value="PDF">PDF</option>
            <option value="QUIZ">Quiz</option>
            <option value="DOCUMENT">Document</option>
            <option value="PRESENTATION">Presentation</option>
            <option value="AUDIO">Audio</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">File URI / URL</label>
          <input type="text" id="ct-uri" class="form-control" placeholder="https://…"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline-ec" onclick="closeModal('upload-modal')">Cancel</button>
      <button class="btn-primary-ec" id="upload-btn" onclick="doUpload()"><i class="fas fa-save"></i> Upload</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
  buildLayout('Content', 'content');

  const user = Auth.getUser();

  const typeIcon = {
    VIDEO:'fa-play-circle', PDF:'fa-file-pdf', QUIZ:'fa-question-circle',
    DOCUMENT:'fa-file-word', PRESENTATION:'fa-file-powerpoint', AUDIO:'fa-music'
  };
  const typeColor = {
    VIDEO:'var(--danger)', PDF:'var(--primary)', QUIZ:'var(--accent)',
    DOCUMENT:'var(--primary-light)', PRESENTATION:'var(--warning)', AUDIO:'var(--success)'
  };

  async function loadContent() {
    const grid  = document.getElementById('content-grid');
    const cid   = document.getElementById('filter-course-id').value.trim();
    grid.innerHTML = '<div class="spinner" style="grid-column:1/-1"></div>';

    try {
      let items = [];
      if (cid) {
        items = await ContentAPI.byCourse(cid);
      } else {
        const courses = await CourseAPI.getByTeacher(user.userId);
        for (const c of courses) {
          const content = await ContentAPI.byCourse(c.courseId);
          items.push(...content);
        }
      }

      if (!items.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-photo-video"></i><p>No content uploaded yet.</p></div>`;
        return;
      }

      grid.innerHTML = items.map(ct => {
        const icon  = typeIcon[ct.type]  || 'fa-file';
        const color = typeColor[ct.type] || 'var(--text-muted)';
        return `
        <div class="card" style="margin:0">
          <div class="card-body">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
              <div style="width:44px;height:44px;border-radius:10px;background:rgba(0,0,0,.05);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:${color}">
                <i class="fas ${icon}"></i>
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ct.title)}</div>
                <div style="font-size:.78rem;color:var(--text-muted)">${esc(ct.type)} · Course #${ct.courseId}</div>
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--text-muted);margin-bottom:12px">
              <span><i class="fas fa-eye"></i> ${ct.accessCount} views</span>
              <span>${fmtDate(ct.uploadedDate)}</span>
            </div>
            <div style="display:flex;gap:8px">
              ${ct.fileUri ? `<a href="${esc(ct.fileUri)}" target="_blank" class="btn-outline-ec" style="font-size:.78rem;padding:5px 10px"><i class="fas fa-external-link-alt"></i> Open</a>` : ''}
              <button class="btn-danger-ec" style="padding:5px 10px;font-size:.78rem;margin-left:auto" onclick="doDelete(${ct.contentId})">
                <i class="fas fa-trash"></i> Remove
              </button>
            </div>
          </div>
        </div>`;
      }).join('');
    } catch(e) {
      grid.innerHTML = `<div style="grid-column:1/-1;color:var(--danger)">Error: ${e.message}</div>`;
    }
  }

  async function doUpload() {
    const btn     = document.getElementById('upload-btn');
    const title   = document.getElementById('ct-title').value.trim();
    const courseId= parseInt(document.getElementById('ct-course').value);
    if (!title || !courseId) return showToast('Title and Course ID are required', 'error');
    setLoading(btn, true, 'Upload');
    try {
      await ContentAPI.upload({
        title, courseId,
        type   : document.getElementById('ct-type').value,
        fileUri: document.getElementById('ct-uri').value.trim(),
      });
      showToast('Content uploaded!', 'success');
      closeModal('upload-modal');
      loadContent();
    } catch(e) { showToast(e.message, 'error'); }
    finally { setLoading(btn, false, '<i class="fas fa-save"></i> Upload'); }
  }

  async function doDelete(contentId) {
    if (!confirm('Remove this content?')) return;
    try {
      await ContentAPI.delete(contentId);
      showToast('Content removed', 'info');
      loadContent();
    } catch(e) { showToast(e.message, 'error'); }
  }

  loadContent();
</script>
</body>
</html>
