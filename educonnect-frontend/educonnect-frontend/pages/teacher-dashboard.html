<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduConnect – Teacher Dashboard</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title"></span>
      <div class="topbar-actions">
        <button class="notif-btn" onclick="location.href='notifications.html'">
          <i class="fas fa-bell"></i>
          <span class="notif-badge" id="notif-count" style="display:none">0</span>
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h2 id="t-welcome">Teacher Dashboard</h2><p>Manage your courses, content and students</p></div>
        <button class="btn-primary-ec" onclick="openModal('create-course-modal')"><i class="fas fa-plus"></i> New Course</button>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card" style="border-left-color:var(--primary-light)">
          <div class="stat-icon blue"><i class="fas fa-book-open"></i></div>
          <div class="stat-info"><div class="stat-value" id="t-courses">—</div><div class="stat-label">My Courses</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--accent)">
          <div class="stat-icon teal"><i class="fas fa-users"></i></div>
          <div class="stat-info"><div class="stat-value" id="t-students">—</div><div class="stat-label">Total Enrollments</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--warning)">
          <div class="stat-icon orange"><i class="fas fa-tasks"></i></div>
          <div class="stat-info"><div class="stat-value" id="t-assessments">—</div><div class="stat-label">Assessments</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--success)">
          <div class="stat-icon green"><i class="fas fa-file-alt"></i></div>
          <div class="stat-info"><div class="stat-value" id="t-pending">—</div><div class="stat-label">Pending Grading</div></div>
        </div>
      </div>

      <!-- My Courses Table -->
      <div class="card">
        <div class="card-header">
          <h5><i class="fas fa-book-open"></i> My Courses</h5>
          <button class="btn-outline-ec" onclick="location.href='teacher-courses.html'">Manage All</button>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="ec-table">
              <thead><tr><th>Course</th><th>Start</th><th>End</th><th>Enrollments</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody id="teacher-courses-tbody"><tr><td colspan="6"><div class="spinner"></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Pending Submissions -->
      <div class="card">
        <div class="card-header">
          <h5><i class="fas fa-clock"></i> Pending Submissions to Grade</h5>
          <button class="btn-outline-ec" onclick="location.href='teacher-submissions.html'">View All</button>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="ec-table">
              <thead><tr><th>Student</th><th>Assessment</th><th>Submitted</th><th>Action</th></tr></thead>
              <tbody id="pending-subs-tbody"><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create Course Modal -->
<div class="modal-overlay" id="create-course-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h5><i class="fas fa-plus-circle"></i> Create New Course</h5>
      <button class="modal-close" onclick="closeModal('create-course-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Course Title *</label>
        <input type="text" id="c-title" class="form-control" placeholder="Introduction to Java…"/>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="c-desc" class="form-control" rows="3" placeholder="Course description…"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Start Date</label>
          <input type="date" id="c-start" class="form-control"/>
        </div>
        <div class="form-group">
          <label class="form-label">End Date</label>
          <input type="date" id="c-end" class="form-control"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline-ec" onclick="closeModal('create-course-modal')">Cancel</button>
      <button class="btn-primary-ec" id="create-course-btn" onclick="doCreateCourse()"><i class="fas fa-save"></i> Create</button>
    </div>
  </div>
</div>

<!-- Grade Modal -->
<div class="modal-overlay" id="grade-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h5><i class="fas fa-star"></i> Grade Submission</h5>
      <button class="modal-close" onclick="closeModal('grade-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="grade-sub-id"/>
      <div class="form-group">
        <label class="form-label">Student</label>
        <input type="text" id="grade-student" class="form-control" disabled/>
      </div>
      <div class="form-group">
        <label class="form-label">Grade (0–100)</label>
        <input type="number" id="grade-value" class="form-control" min="0" max="100" placeholder="85"/>
      </div>
      <div class="form-group">
        <label class="form-label">Feedback</label>
        <textarea id="grade-feedback" class="form-control" rows="3" placeholder="Well done! …"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline-ec" onclick="closeModal('grade-modal')">Cancel</button>
      <button class="btn-primary-ec" id="grade-btn" onclick="doGrade()"><i class="fas fa-save"></i> Save Grade</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
  buildLayout('Teacher Dashboard', 'dashboard');

  const user = Auth.getUser();
  document.getElementById('t-welcome').textContent = `Welcome, ${user.name}!`;

  async function loadDashboard() {
    try {
      const courses = await CourseAPI.getByTeacher(user.userId);
      document.getElementById('t-courses').textContent = courses.length;

      const totalEnroll = courses.reduce((a,c) => a + (c.enrollmentCount||0), 0);
      document.getElementById('t-students').textContent = totalEnroll;

      // Courses table
      const tbody = document.getElementById('teacher-courses-tbody');
      if (!courses.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-book-open"></i><p>No courses yet. Create one!</p></div></td></tr>`;
      } else {
        tbody.innerHTML = courses.map(c => `<tr>
          <td><strong>${esc(c.title)}</strong><br/><small style="color:var(--text-muted)">${esc(c.description||'').slice(0,50)}</small></td>
          <td>${fmtDate(c.startDate)}</td>
          <td>${fmtDate(c.endDate)}</td>
          <td><span style="font-weight:600">${c.enrollmentCount}</span></td>
          <td>${badge(c.status)}</td>
          <td>
            <button class="btn-outline-ec" style="font-size:.78rem;padding:4px 10px" onclick="location.href='teacher-content.html?courseId=${c.courseId}'">Content</button>
            <button class="btn-outline-ec" style="font-size:.78rem;padding:4px 10px;margin-left:4px" onclick="location.href='teacher-assessments.html?courseId=${c.courseId}'">Assess</button>
          </td>
        </tr>`).join('');
      }

      // Load all assessments for all courses to find pending subs
      let assessmentCount = 0;
      let pendingSubs = [];
      for (const c of courses) {
        const assessments = await AssessmentAPI.byCourse(c.courseId);
        assessmentCount += assessments.length;
        for (const a of assessments) {
          const subs = await AssessmentAPI.submissionsByAssessment(a.assessmentId);
          const pending = subs.filter(s => s.status === 'PENDING');
          pendingSubs.push(...pending);
        }
      }

      document.getElementById('t-assessments').textContent = assessmentCount;
      document.getElementById('t-pending').textContent = pendingSubs.length;

      const pTbody = document.getElementById('pending-subs-tbody');
      if (!pendingSubs.length) {
        pTbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><i class="fas fa-check-circle"></i><p>No pending submissions.</p></div></td></tr>`;
      } else {
        pTbody.innerHTML = pendingSubs.slice(0,10).map(s => `<tr>
          <td><strong>${esc(s.studentName)}</strong></td>
          <td>${esc(s.assessmentTitle)}</td>
          <td>${fmtDate(s.date)}</td>
          <td>
            <button class="btn-accent-ec" style="padding:5px 12px;font-size:.8rem"
              onclick="openGradeModal(${s.submissionId},'${esc(s.studentName)}')">
              <i class="fas fa-star"></i> Grade
            </button>
          </td>
        </tr>`).join('');
      }
    } catch(e) { showToast('Load error: ' + e.message, 'error'); }
  }

  async function doCreateCourse() {
    const btn = document.getElementById('create-course-btn');
    const title = document.getElementById('c-title').value.trim();
    if (!title) return showToast('Title is required', 'error');
    setLoading(btn, true, 'Create');
    try {
      await CourseAPI.create({
        title,
        description: document.getElementById('c-desc').value.trim(),
        teacherId:   user.userId,
        startDate:   document.getElementById('c-start').value || null,
        endDate:     document.getElementById('c-end').value   || null,
      });
      showToast('Course created!', 'success');
      closeModal('create-course-modal');
      loadDashboard();
    } catch(e) { showToast(e.message, 'error'); }
    finally { setLoading(btn, false, '<i class="fas fa-save"></i> Create'); }
  }

  function openGradeModal(subId, studentName) {
    document.getElementById('grade-sub-id').value = subId;
    document.getElementById('grade-student').value = studentName;
    document.getElementById('grade-value').value = '';
    document.getElementById('grade-feedback').value = '';
    openModal('grade-modal');
  }

  async function doGrade() {
    const btn = document.getElementById('grade-btn');
    const subId = document.getElementById('grade-sub-id').value;
    const grade = parseFloat(document.getElementById('grade-value').value);
    if (isNaN(grade)) return showToast('Enter a valid grade', 'error');
    setLoading(btn, true, 'Save Grade');
    try {
      await AssessmentAPI.grade(subId, { grade, feedback: document.getElementById('grade-feedback').value.trim() });
      showToast('Grade saved!', 'success');
      closeModal('grade-modal');
      loadDashboard();
    } catch(e) { showToast(e.message, 'error'); }
    finally { setLoading(btn, false, '<i class="fas fa-save"></i> Save Grade'); }
  }

  loadDashboard();
</script>
</body>
</html>
