<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduConnect – Reports</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title"></span>
      <div class="topbar-actions">
        <button class="notif-btn" onclick="location.href='notifications.html'">
          <i class="fas fa-bell"></i>
          <span class="notif-badge" id="notif-count" style="display:none">0</span>
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h2>Reports &amp; Analytics</h2><p>Platform-wide metrics and generated reports</p></div>
        <button class="btn-primary-ec" onclick="openModal('gen-modal')"><i class="fas fa-plus"></i> Generate Report</button>
      </div>

      <!-- Dashboard metrics -->
      <div class="stats-grid" id="metrics-grid">
        <div class="spinner"></div>
      </div>

      <!-- Course Report Lookup -->
      <div class="card">
        <div class="card-header"><h5><i class="fas fa-book-open"></i> Course Report Lookup</h5></div>
        <div class="card-body">
          <div style="display:flex;gap:12px;align-items:flex-end">
            <div class="form-group" style="flex:1;margin:0">
              <label class="form-label">Course ID</label>
              <input type="number" id="course-id-input" class="form-control" placeholder="e.g. 1"/>
            </div>
            <button class="btn-accent-ec" onclick="loadCourseReport()" style="margin-bottom:1px"><i class="fas fa-search"></i> Fetch Report</button>
          </div>
          <div id="course-report-result" style="margin-top:16px"></div>
        </div>
      </div>

      <!-- Generated Reports -->
      <div class="card">
        <div class="card-header"><h5><i class="fas fa-file-alt"></i> Generated Reports</h5></div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="ec-table">
              <thead><tr><th>Scope</th><th>Generated Date</th><th>Generated By</th></tr></thead>
              <tbody id="reports-tbody"><tr><td colspan="3"><div class="spinner"></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Generate Report Modal -->
<div class="modal-overlay" id="gen-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h5><i class="fas fa-chart-bar"></i> Generate Report</h5>
      <button class="modal-close" onclick="closeModal('gen-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Scope</label>
        <select id="gen-scope" class="form-select">
          <option value="Course">Course</option>
          <option value="Assessment">Assessment</option>
          <option value="Program">Program</option>
          <option value="Compliance">Compliance</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline-ec" onclick="closeModal('gen-modal')">Cancel</button>
      <button class="btn-primary-ec" id="gen-btn" onclick="doGenerate()"><i class="fas fa-save"></i> Generate</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
  buildLayout('Reports & Analytics', 'reports');

  const user = Auth.getUser();

  async function loadDashboard() {
    try {
      const m = await ReportAPI.dashboard();
      document.getElementById('metrics-grid').innerHTML = `
        <div class="stat-card" style="border-left-color:var(--primary-light)">
          <div class="stat-icon blue"><i class="fas fa-user-graduate"></i></div>
          <div class="stat-info"><div class="stat-value">${m.totalStudents||0}</div><div class="stat-label">Students</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--accent)">
          <div class="stat-icon teal"><i class="fas fa-book-open"></i></div>
          <div class="stat-info"><div class="stat-value">${m.totalCourses||0}</div><div class="stat-label">Courses</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--warning)">
          <div class="stat-icon orange"><i class="fas fa-user-check"></i></div>
          <div class="stat-info"><div class="stat-value">${m.totalEnrollments||0}</div><div class="stat-label">Enrollments</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--success)">
          <div class="stat-icon green"><i class="fas fa-tasks"></i></div>
          <div class="stat-info"><div class="stat-value">${m.totalAssessments||0}</div><div class="stat-label">Assessments</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--danger)">
          <div class="stat-icon red"><i class="fas fa-file-alt"></i></div>
          <div class="stat-info"><div class="stat-value">${m.totalSubmissions||0}</div><div class="stat-label">Submissions</div></div>
        </div>
        <div class="stat-card" style="border-left-color:var(--primary)">
          <div class="stat-icon blue"><i class="fas fa-chart-line"></i></div>
          <div class="stat-info"><div class="stat-value">${m.averageCourseCompletion||0}%</div><div class="stat-label">Avg Completion</div></div>
        </div>`;
    } catch(e) { showToast('Metrics error: '+e.message,'error'); }
  }

  async function loadReports() {
    const tbody = document.getElementById('reports-tbody');
    try {
      const reports = await ReportAPI.getAll();
      tbody.innerHTML = reports.length
        ? reports.map(r => `<tr>
            <td>${badge(r.scope)}</td>
            <td>${fmtDate(r.generatedDate)}</td>
            <td>${esc(r.generatedBy?.name || '—')}</td>
          </tr>`).join('')
        : `<tr><td colspan="3"><div class="empty-state"><i class="fas fa-file-alt"></i><p>No reports generated yet.</p></div></td></tr>`;
    } catch(e) { tbody.innerHTML = `<tr><td colspan="3" style="color:var(--danger)">Failed to load reports.</td></tr>`; }
  }

  async function loadCourseReport() {
    const cid = document.getElementById('course-id-input').value.trim();
    if (!cid) return showToast('Enter a course ID', 'error');
    const el = document.getElementById('course-report-result');
    el.innerHTML = '<div class="spinner"></div>';
    try {
      const r = await ReportAPI.course(cid);
      el.innerHTML = `
        <div style="background:#f7f9fc;border-radius:10px;padding:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px">
          <div><div style="font-size:.75rem;color:var(--text-muted);text-transform:uppercase;font-weight:700">Course</div><div style="font-weight:700;font-size:1rem">${esc(r.courseTitle)}</div></div>
          <div><div style="font-size:.75rem;color:var(--text-muted);text-transform:uppercase;font-weight:700">Enrollments</div><div style="font-weight:700;font-size:1.4rem;color:var(--primary)">${r.totalEnrollments}</div></div>
          <div><div style="font-size:.75rem;color:var(--text-muted);text-transform:uppercase;font-weight:700">Assessments</div><div style="font-weight:700;font-size:1.4rem;color:var(--accent)">${r.totalAssessments}</div></div>
          <div><div style="font-size:.75rem;color:var(--text-muted);text-transform:uppercase;font-weight:700">Avg Completion</div><div style="font-weight:700;font-size:1.4rem;color:var(--success)">${r.averageCompletion}%</div></div>
        </div>`;
    } catch(e) { el.innerHTML = `<p style="color:var(--danger)">${e.message}</p>`; }
  }

  async function doGenerate() {
    const btn = document.getElementById('gen-btn');
    setLoading(btn, true, 'Generate');
    try {
      await ReportAPI.generate(document.getElementById('gen-scope').value, user.userId);
      showToast('Report generated!', 'success');
      closeModal('gen-modal');
      loadReports();
    } catch(e) { showToast(e.message,'error'); }
    finally { setLoading(btn, false, '<i class="fas fa-save"></i> Generate'); }
  }

  loadDashboard();
  loadReports();
</script>
</body>
</html>
