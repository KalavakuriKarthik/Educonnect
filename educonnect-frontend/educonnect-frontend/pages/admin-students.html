<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduConnect – Students</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title"></span>
      <div class="topbar-actions">
        <button class="notif-btn" onclick="location.href='notifications.html'">
          <i class="fas fa-bell"></i><span class="notif-badge" id="notif-count" style="display:none">0</span>
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h2>Students</h2><p>View and manage all student profiles</p></div>
      </div>

      <div class="card" style="margin-bottom:20px">
        <div class="card-body">
          <input type="text" id="search-input" class="form-control" placeholder="Search by name or email…" oninput="filterStudents()" style="max-width:400px"/>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h5><i class="fas fa-user-graduate"></i> All Students</h5></div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="ec-table">
              <thead><tr><th>#</th><th>Name</th><th>Email</th><th>DOB</th><th>Gender</th><th>Contact</th><th>Status</th><th>Enrollments</th></tr></thead>
              <tbody id="students-tbody"><tr><td colspan="8"><div class="spinner"></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
  buildLayout('Students', 'students');

  let allStudents = [];

  async function loadStudents() {
    const tbody = document.getElementById('students-tbody');
    try {
      allStudents = await StudentAPI.getAll();
      render(allStudents);
    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="8" style="color:var(--danger)">Failed: ${e.message}</td></tr>`;
    }
  }

  function filterStudents() {
    const q = document.getElementById('search-input').value.toLowerCase();
    render(allStudents.filter(s =>
      s.name.toLowerCase().includes(q) || (s.email||'').toLowerCase().includes(q)
    ));
  }

  function render(list) {
    const tbody = document.getElementById('students-tbody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="fas fa-user-graduate"></i><p>No students found.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map((s, i) => `<tr>
      <td style="color:var(--text-muted)">${i+1}</td>
      <td><strong>${esc(s.name)}</strong></td>
      <td style="color:var(--text-muted)">${esc(s.email||'—')}</td>
      <td>${fmtDate(s.dob)}</td>
      <td>${esc(s.gender||'—')}</td>
      <td>${esc(s.contactInfo||'—')}</td>
      <td>${badge(s.status)}</td>
      <td>
        <button class="btn-outline-ec" style="padding:3px 10px;font-size:.75rem" onclick="viewEnrollments(${s.studentId})">
          <i class="fas fa-list"></i> View
        </button>
      </td>
    </tr>`).join('');
  }

  async function viewEnrollments(sid) {
    try {
      const enrollments = await EnrollmentAPI.byStudent(sid);
      const list = enrollments.map(e => `• ${e.courseTitle} (${e.status})`).join('\n');
      alert(list || 'No enrollments.');
    } catch(e) { showToast(e.message, 'error'); }
  }

  loadStudents();
</script>
</body>
</html>
